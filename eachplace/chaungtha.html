<body>
   
    <div id="glassbox">

                <nav>
                    <button onclick="showTopic(0)"> <i class="fa-solid fa-bookmark"></i></button>
                    <button onclick="showTopic(1)"> <i class="fa-solid fa-hourglass-start"></i></button>
                    <button onclick="showTopic(2)"><i class="fa-regular fa-clock"></i></button>

                <div id="about">

                    ⩥  Beach activities (kites, football), boat trips to Thel Phyu Island and Pho Kalar Island, and visiting the Kyauk Maung Nama Pagoda.
                </div>
            </div>

        </div>
        <div id="img">

            <img id="simg" src="../image & logo/cha1.jpg">

    <div class="book">

    </div>
    <a id="book" href="../eachaboutpage/ayeyarwaddy.html" style="position: absolute;top:20px;left:20px;">Back</a>
    <script>
        const data = [
            {
                "tropic": "<h3>Attraction</h3>",
                "list": "⩥ Beach activities (kites, football), boat trips to Thel Phyu Island and Pho Kalar Island, and visiting the Kyauk Maung Nama Pagoda."
            },
            {
                "tropic": "<h3>History</h3>",
                "list": "⩥  The name Chaung Tha means Pleasant Stream, and the area is tied to local legends like the Brother and Sister Rocks."
            },
            {
                "tropic": "<h3>Best Time To Go</h3>",
                "list": "⩥  October to May (Most crowded during holidays)."
            },
            {
                "tropic": "<h3>Transportation</h3>",
                "list": "⩥  5-6 hours drive from Yangon by express bus or car."
            },
        ]
        function showTopic(index) {
            const p = document.getElementById('about');
            const item = data[index];
            p.innerHTML = `<div class="fade-in">${item.tropic}<br>${item.list}</div>`;
        }
    </script>
