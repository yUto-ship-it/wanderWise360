    <script>
        const data = [
            {
                "tropic": "<h3>Attraction</h3>",
                "list": "⩥  The Kyaiktiyo Pagoda is one of Myanmar's most sacred Buddhist sites, famous for a massive granite boulder gilded in gold leaf that balances precariously on a cliff edge."

        function showTopic(index) {

            const item = data[index];
            p.innerHTML = `<div class="fade-in">${item.tropic}<br>${item.list}</div>`;
        }
