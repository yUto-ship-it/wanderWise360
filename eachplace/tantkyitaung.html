<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/taunggyi.css">
</head>

<body>
   
    <div id="glassbox">
        <div id="text">
            <h1>Tantkyitaung Pagoda</h1><br><br>
            <div id="left">
                <nav>
                    <button onclick="showTopic(0)"> <i class="fa-solid fa-bookmark"></i></button>
                    <button onclick="showTopic(1)"> <i class="fa-solid fa-hourglass-start"></i></button>
                    <button onclick="showTopic(2)"><i class="fa-regular fa-clock"></i></button>
                    <button onclick="showTopic(3)"><i class="fa-solid fa-bus-simple"></i></button>
                </nav>
                <div id="about">
                    <h3>Attraction</h3><br>
                    ⩥    A historic hilltop pagoda offering a stunning 360-degree panoramic view of the Ayeyarwady River and the ancient Bagan horizon.
                </div>
            </div>

        </div>
        <div id="img">

            <img id="simg" src="../image & logo/tant1.jpg">
            <img id="simg" src="../image & logo/tant2.jpg">
            <img id="simg" src="../image & logo/tant3.jpg">

        </div>
    </div>
    <div class="book">
        <a id="book" href="../eachservicepage/magway.html">For more service</a>
    </div>
    <a id="book" href="../eachaboutpage/magway.html" style="position: absolute;top:20px;left:20px;">Back</a>
    <script>
        const data = [
            {
                "tropic": "<h3>Attraction</h3>",
                "list": "⩥  A historic hilltop pagoda offering a stunning 360-degree panoramic view of the Ayeyarwady River and the ancient Bagan horizon."
            },
            {
                "tropic": "<h3>History</h3>",
                "list": "⩥ Built by King Anawrahta in 1059 AD to enshrine a sacred tooth relic, marking the spot where Buddha reportedly stood and looked out over the future kingdom of Bagan."
            },
            {
                "tropic": "<h3>Best Time To Go</h3>",
                "list": "⩥    The cool season from October to February is ideal, especially during sunrise or sunset for the most beautiful lighting."
            },
            {
                "tropic": "<h3>Transportation</h3>",
                "list": "⩥    Accessible by crossing the river from Bagan by boat followed by a 4WD taxi climb, or via a direct road from Pakokku."
            },
        ]
        function showTopic(index) {
            const p = document.getElementById('about');
            const item = data[index];
            p.innerHTML = `<div class="fade-in">${item.tropic}<br>${item.list}</div>`;
        }
    </script>
</body>

</html>
