<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tantkyitaung Pagoda | Explore Myanmar</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-dark: #1e293b;
            --accent: #f97316;
            /* Sunset Orange */
            --white: #ffffff;
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url("../image & logo/tant1.jpg");
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Back Button */
        .back-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            text-decoration: none;
            color: var(--text-dark);
            background: var(--white);
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            transform: translateX(-5px);
            background: var(--accent);
            color: white;
        }

        /* Main Glass Card */
        .glass-card {
            width: 100%;
            max-width: 1100px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            overflow: hidden;
            box-shadow: var(--shadow);
            animation: cardLoad 0.8s ease-out;
        }

        /* Content Section */
        .content-section {
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .title {
            font-size: 3.2rem;
            font-weight: 800;
            margin-bottom: 25px;
            color: var(--white);
            letter-spacing: -1px;
            line-height: 1.1;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        .interaction-area {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        .side-nav {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-dot {
            width: 55px;
            height: 55px;
            border-radius: 18px;
            border: none;
            background: var(--white);
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #64748b;
        }

        .nav-dot.active {
            background: var(--accent);
            color: white;
            transform: scale(1.15);
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.4);
        }

        .info-box {
            min-height: 240px;
        }

        .info-box h3 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .info-list {
            list-style: none;
        }

        .info-list li {
            margin-bottom: 12px;
            font-size: 1.1rem;
            color: var(--white);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            line-height: 1.5;
        }

        .info-list li::before {
            content: "\f672";
            /* Dharmachakra Icon */
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            color: var(--accent);
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 40px;
            padding: 16px 35px;
            background: var(--text-dark);
            color: white;
            text-decoration: none;
            border-radius: 18px;
            font-weight: 600;
            transition: 0.3s;
            width: fit-content;
        }

        .cta-btn:hover {
            background: var(--accent);
            transform: translateY(-4px);
        }

        /* Image Section */
        .image-section {
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
        }

        .image-grid {
            display: grid;
            gap: 20px;
            width: 100%;
        }

        .grid-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 25px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            transition: 0.5s;
            border: 2px solid transparent;
        }

        .grid-img:hover {
            transform: scale(1.05);
            border-color: var(--accent);
        }

        /* Responsive */
        @media (max-width: 992px) {
            .glass-card {
                grid-template-columns: 1fr;
                margin-top: 60px;
            }

            .image-section {
                order: -1;
                padding: 30px;
            }

            .image-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .title {
                font-size: 2.8rem;
                text-align: center;
            }
        }

        @media (max-width: 768px) {
            .interaction-area {
                flex-direction: column;
            }

            .side-nav {
                flex-direction: row;
                justify-content: center;
                width: 100%;
            }

            .info-box {
                text-align: center;
            }

            .info-list li {
                justify-content: center;
                text-align: left;
            }

            .image-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @keyframes cardLoad {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>

<body>

    <a onclick="history.back()" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i> Back
    </a>

    <div class="glass-card">
        <section class="content-section">
            <h1 class="title">Tantkyitaung Pagoda</h1>

            <div class="interaction-area">
                <nav class="side-nav">
                    <button class="nav-dot active" onclick="showTopic(0, this)">
                        <i class="fa-solid fa-bookmark" title="Attraction"></i>
                    </button>
                    <button class="nav-dot" onclick="showTopic(1, this)">
                        <i class="fa-solid fa-hourglass-start" title="History"></i>
                    </button>
                    <button class="nav-dot" onclick="showTopic(2, this)">
                        <i class="fa-regular fa-clock" title="Best Time"></i>
                    </button>
                    <button class="nav-dot" onclick="showTopic(3, this)">
                        <i class="fa-solid fa-bus-simple" title="Transport"></i>
                    </button>
                </nav>
                <div id="about" class="info-box">
                    <div class="fade-in">
                        <h3>Attraction</h3>
                        <ul class="info-list">
                            <li>Historic hilltop pagoda with 360-degree views</li>
                            <li>Breathtaking panoramic view of the Ayeyarwady River</li>
                            <li>Unmatched view of the ancient Bagan horizon</li>
                        </ul>
                    </div>
                </div>
            </div>

            <a href="../eachservicepage/magway.html" class="cta-btn">
                For more services <i class="fa-solid fa-arrow-right"></i>
            </a>
        </section>

        <section class="image-section">
            <div class="image-grid">
                <img src="../image & logo/tant1.jpg" alt="Pagoda View" class="grid-img">
                <img src="../image & logo/tant2.jpg" alt="River Landscape" class="grid-img">
                <img src="../image & logo/tant3.jpg" alt="Ancient Heritage" class="grid-img">
            </div>
        </section>
    </div>

    <script>
        const data = [
            {
                "topic": "Attraction",
                "list": "<li>Historic hilltop pagoda with iconic panoramic views</li><li>Spectacular sightings of the Ayeyarwady River flow</li><li>Unique perspective of the thousand-year-old Bagan temples</li>"
            },
            {
                "topic": "History",
                "list": "<li>Built by King Anawrahta in 1059 AD</li><li>Enshrines a sacred tooth relic of the Buddha</li><li>Marks the spot where Buddha looked over future Bagan</li>"
            },
            {
                "topic": "Best Time To Go",
                "list": "<li>Cool season (October to February) is ideal</li><li>Sunrise or sunset for magical golden lighting</li><li>Avoid the heavy rainy months for clear views</li>"
            },
            {
                "topic": "Transportation",
                "list": "<li>Cross from Bagan by boat followed by 4WD taxi</li><li>Direct road access available from Pakokku city</li><li>Hiking trails available for traditional pilgrims</li>"
            }
        ];

        function showTopic(index, btn) {
            document.querySelectorAll('.nav-dot').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const infoBox = document.getElementById('about');
            const item = data[index];

            infoBox.innerHTML =
                <div class="fade-in">
                    <h3>${item.topic}</h3>
                    <ul class="info-list">${item.list}</ul>
                </div>
                ;
        }
    </script>
</body>

</html>
