<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>
   
    <div id="glassbox">
        <div id="text">
            <h1>Man Aung Island</h1><br><br>
            <div id="left">
                <nav>
                    <button onclick="showTopic(0)"> <i class="fa-solid fa-bookmark"></i></button>
                    <button onclick="showTopic(1)"> <i class="fa-solid fa-hourglass-start"></i></button>
                    <button onclick="showTopic(2)"><i class="fa-regular fa-clock"></i></button>
                    <button onclick="showTopic(3)"><i class="fa-solid fa-bus-simple"></i></button>
                </nav>
                <div id="about">
                    <h3>Attraction</h3><br>
                    ⩥   Nanthida Beach<br>⩥  Kyauk Taung Pagoda (360° sea view)<br>⩥   Natural mud volcanoes
                </div>
            </div>

        </div>
        <div id="img">

            <img id="simg" src="../image & logo/man1.jpg">
            <img id="simg" src="../image & logo/man2.jpg">
            <img id="simg" src="../image & logo/man3.jpg">

        </div>
    </div>
    <div class="book">
        <a id="book" href="../eachservicepage/rakhine.html">For more service</a>
    </div>
    <a id="book" href="../eachaboutpage/rakhine.html" style="position: absolute;top:20px;left:20px;">Back</a>
    <script>
        const data = [
            {
                "tropic": "<h3>Attraction</h3>",
                "list": "⩥   Nanthida Beach<br>⩥  Kyauk Taung Pagoda (360° sea view)<br>⩥   Natural mud volcanoes"
            },
            {
                "tropic": "<h3>History</h3>",
                "list": "⩥   Manaung Island is a historically significant island in Rakhine State that served as a strategic maritime outpost during the Arakanese Kingdom era and is legendary for its unique mud volcanoes and pristine, untouched natural beauty."
            },
            {
                "tropic": "<h3>Best Time To Go</h3>",
                "list": "⩥   December – April"
            },
            {
                "tropic": "<h3>Transportation</h3>",
                "list": "⩥   Domestic flight to Manaung<br>⩥  Boat from Kyaukpyu or Taungup"
            },
        ]
        function showTopic(index) {
            const p = document.getElementById('about');
            const item = data[index];
            p.innerHTML = `<div class="fade-in">${item.tropic}<br>${item.list}</div>`;
        }
    </script>
</body>

</html>
