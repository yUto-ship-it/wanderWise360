    <script>
      
        const data = [
            {
                "tropic": "<h3>Attraction</h3>",
                "list": "⩥ Known as the Maldives of Myanmar, this island offers an pristine, unspoiled natural environment with crystal-clear waters, vibrant coral reefs, and sandy beaches. It is a premier spot for snorkeling, scuba diving, hiking, and camping."
            },
            {
                "tropic": "<h3>History</h3>",
                "list": "⩥   The island is primarily recognized for its natural ecological state and has been developed recently as an eco-tourism destination rather than a site of significant historical human settlement "
            },
            {
                "tropic":"<h3>Best Time To Go</h3>",
                "list": "⩥    The optimal time to visit is during the dry season, from November to May, when the sea is calm, the skies are clear, and weather conditions are most comfortable for water activities."
            },
            {

                "list": "⩥   You can take a 30-minute to 1.5-hour speedboat ride from Kawthaung to reach the island. Booking a professional travel package is highly recommended as independent transport options are limited."
            },
        ]
        function showTopic(index) {
            const p = document.getElementById('about');
            const item = data[index];
            p.innerHTML = `<div class="fade-in">${item.tropic}<br>${item.list}</div>`;
        }
    </script>
