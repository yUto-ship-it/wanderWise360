    <script>
        const data = [
            {
                "tropic": "<h3>Attraction</h3>",
                "list": "⩥  As the gateway to the 800+ islands of the Mergui Archipelago, Myeik is famous for its rich maritime culture, colonial-era architecture, traditional boat-building yards, and local seafood markets. "

                "list": "⩥   Myeik is accessible via flights from Yangon, Dawei, or Kawthaung, and is also connected by road and sea routes."
            },
        ]
        function showTopic(index) {
            const p = document.getElementById('about');
            const item = data[index];
            p.innerHTML = `<div class="fade-in">${item.tropic}<br>${item.list}</div>`;
        }
