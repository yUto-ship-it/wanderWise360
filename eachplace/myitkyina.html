<!DOCTYPE html>
<html lang="en">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>
   
    <div id="glassbox">
        <div id="text">
            <h1>Myitkyina</h1><br><br>
            <div id="left">
                <nav>
                    <button onclick="showTopic(0)"> <i class="fa-solid fa-bookmark"></i></button>
                    <button onclick="showTopic(1)"> <i class="fa-solid fa-hourglass-start"></i></button>
                    <button onclick="showTopic(2)"><i class="fa-regular fa-clock"></i></button>
                    <button onclick="showTopic(3)"><i class="fa-solid fa-bus-simple"></i></button>
                </nav>
                <div id="about">
                    <h3>Attraction</h3><br>
                    ⩥   Today, it serves as the cultural heart of the Kachin people and a gateway to the far north. The city is famous for its vibrant Manau Park and its diverse ethnic harmony.
                </div>
            </div>

        </div>
        <div id="img">

            <img id="simg" src="../image & logo/myit1.jpg">
            <img id="simg" src="../image & logo/myit2.jpg">
            <img id="simg" src="../image & logo/myit3.jpg">

        </div>
    </div>
    <div class="book">
        <a id="book" href="../eachservicepage/kachin.html">For more service</a>
    </div>
    <a id="book" href="../eachaboutpage/kachin.html" style="position: absolute;top:20px;left:20px;">Back</a>
    <script>
        const data = [
            {
                "tropic": "<h3>Attraction</h3>",
                "list": "⩥  Today, it serves as the cultural heart of the Kachin people and a gateway to the far north. The city is famous for its vibrant Manau Park and its diverse ethnic harmony."
            },
            {
                "tropic": "<h3>History</h3>",
                "list": "⩥   Myitkyina has historically been a crucial trading hub between China and Myanmar due to its strategic location on the Irrawaddy River. During World War II, it became a major battlefield where Allied forces fought to reclaim the city from Japanese occupation to secure the Ledo Road."
            },
            {
                "tropic": "<h3>Best Time To Go</h3>",
                "list": "⩥   November to February (Winter). The climate is cool and pleasant, ideal for the Kachin Manau Festival in January."
            },
            {
                "tropic": "<h3>Transportation</h3>",
                "list": "⩥    Reachable by Flight from Yangon/Mandalay (fastest), by Train (scenic but long), or by Highway Express Bus."
            },
        ]
        function showTopic(index) {
            const p = document.getElementById('about');
            const item = data[index];
            p.innerHTML = `<div class="fade-in">${item.tropic}<br>${item.list}</div>`;
        }
    </script>
</body>

</html>
