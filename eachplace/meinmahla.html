<body>
   
    <div id="glassbox">

                <nav>
                    <button onclick="showTopic(0)"> <i class="fa-solid fa-bookmark"></i></button>

                    <button onclick="showTopic(2)"><i class="fa-regular fa-clock"></i></button>

                <div id="about">

                    ⩥   Mangrove ecosystem, saltwater crocodiles, bird watching (over 100 species), and Irrawaddy dolphins.
                       
                </div>
            </div>

        </div>
        <div id="img">

            <img id="simg" src="../image & logo/aya1.jpg">

    <div class="book">

    </div>
    <a id="book" href="../eachaboutpage/ayeyarwaddy.html" style="position: absolute;top:20px;left:20px;">Back</a>
    <script>
        const data = [
            {
                "tropic": "<h3>Attraction</h3>",
                "list": "⩥  Mangrove ecosystem, saltwater crocodiles, bird watching (over 100 species), and Irrawaddy dolphins."
            },
            {
                "tropic": "<h3>History</h3>",
                "list": "⩥   An ASEAN Heritage Park (designated in 2017) protected to conserve the delta's unique biodiversity."
            },
            {
                "tropic": "<h3>Best Time To Go</h3>",
                "list": "⩥   October to May; December and January for turtle nesting."
            },
            {
                "tropic": "<h3>Transportation</h3>",
                "list": "⩥  4 hours from Yangon to Bogale by car/boat, then 2-3 hours by boat to the sanctuary."
            },
        ]
        function showTopic(index) {
            const p = document.getElementById('about');
            const item = data[index];
            p.innerHTML = `<div class="fade-in">${item.tropic}<br>${item.list}</div>`;
        }
    </script>
