<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/taunggyi.css">
</head>

<body>
   
    <div id="glassbox">
        <div id="text">
            <h1>Kanbawzathadi Palace</h1><br><br>
            <div id="left">
                <nav>
                    <button onclick="showTopic(0)"> <i class="fa-solid fa-bookmark"></i></button>
                    <button onclick="showTopic(1)"> <i class="fa-solid fa-hourglass-start"></i></button>
                    <button onclick="showTopic(2)"><i class="fa-regular fa-clock"></i></button>
                    <button onclick="showTopic(3)"><i class="fa-solid fa-bus-simple"></i></button>
                </nav>
                <div id="about">
                    <h3>Attraction</h3><br>
                    ⩥   A magnificent reconstruction of the 16th-century palace. Key highlights include the Bhamayathana Throne Room (Great Golden Hall) and the Bee Throne Hall. You can see original teak pillars and various royal artifacts in the onsite museum.
                </div>
            </div>

        </div>
        <div id="img">

            <img id="simg" src="../image & logo/kanbaw1.jpg">
            <img id="simg" src="../image & logo/kanbaw2.jpg">
            <img id="simg" src="../image & logo/kanbaw3.jpg">

        </div>
    </div>
    <div class="book">
        <a id="book" href="../eachservicepage/bago.html">For more service</a>
    </div>
    <a id="book" href="../eachaboutpage/bago.html" style="position: absolute;top:20px;left:20px;">Back</a>
    <script>
        const data = [
            {
                "tropic": "<h3>Attraction</h3>",
                "list": "⩥  A magnificent reconstruction of the 16th-century palace. Key highlights include the Bhamayathana Throne Room (Great Golden Hall) and the Bee Throne Hall. You can see original teak pillars and various royal artifacts in the onsite museum."
            },
            {
                "tropic": "<h3>History</h3>",
                "list": "⩥   Originally built in 1553 by King Bayinnaung, the founder of the Second Myanmar Empire. It was a massive complex but was destroyed by fire in 1599. The current palace was reconstructed in the 1990s based on the original foundations and archaeological findings."
            },
            {
                "tropic": "<h3>Best Time To Go</h3>",
                "list": "⩥    October to March (Cool season) is the most comfortable for walking around the vast palace grounds."
            },
            {
                "tropic": "<h3>Transportation</h3>",
                "list": "⩥    Located in the center of Bago city. You can reach Bago from Yangon by train (2 hours) or car/bus (1.5 - 2 hours). Inside the city, you can use a Tuk Tuk or motorbike taxi."
            },
        ]
        function showTopic(index) {
            const p = document.getElementById('about');
            const item = data[index];
            p.innerHTML = `<div class="fade-in">${item.tropic}<br>${item.list}</div>`;
        }
    </script>
</body>

</html>
