</head>

<body>
   
    <div id="glassbox">
        <div id="text">
            <h1>Sadan Cave</h1><br><br>
            <div id="left">
                <nav>
                    <button onclick="showTopic(0)"> <i class="fa-solid fa-bookmark"></i></button>
                    <button onclick="showTopic(1)"> <i class="fa-solid fa-hourglass-start"></i></button>
                    <button onclick="showTopic(2)"><i class="fa-regular fa-clock"></i></button>
                    <button onclick="showTopic(3)"><i class="fa-solid fa-bus-simple"></i></button>
                </nav>
                <div id="about">

                    ⩥   One of the largest caves in Kayin State<br>⩥   Buddha statues inside the cave<br>⩥   Beautiful farmland and lake view at the exit
                </div>
            </div>

        </div>
        <div id="img">

            <img id="simg" src="../image & logo/sadan1.jpg">
            <img id="simg" src="../image & logo/sadan2.jpg">
            <img id="simg" src="../image & logo/sadan3.jpg">

        </div>
    </div>
    <div class="book">
        <a id="book" href="../eachservicepage/kayin.html">For more service</a>
    </div>
    <a id="book" href="../eachaboutpage/kayin.html" style="position: absolute;top:20px;left:20px;">Back</a>
    <script>
        const data = [
            {
                "tropic": "<h3>Attraction</h3>",
                "list": " ⩥   One of the largest caves in Kayin State<br>⩥   Buddha statues inside the cave<br>⩥   Beautiful farmland and lake view at the exit"
            },
            {
                "tropic": "<h3>History</h3>",
                "list": "⩥  This natural limestone cave has become one of the most famous tourist attractions in the region"
            },
            {
                "tropic": "<h3>Best Time To Go</h3>",
                "list": "⩥   Visit in the morning(9:00 AM 11:00 AM)<br>⩥    June-October"
            },
            {
                "tropic": "<h3>Transportation</h3>",
                "list": "⩥  Local tour services available <br>⩥   Taxi or motorbike from Hpa-An"
            },
        ]
        function showTopic(index) {
            const p = document.getElementById('about');
            const item = data[index];
            p.innerHTML = `<div class="fade-in">${item.tropic}<br>${item.list}</div>`;
        }
    </script>
