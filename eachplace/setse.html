<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>
   
    <div id="glassbox">
        <div id="text">
            <h1>Setse Beach</h1><br><br>
            <div id="left">
                <nav>
                    <button onclick="showTopic(0)"> <i class="fa-solid fa-bookmark"></i></button>
                    <button onclick="showTopic(1)"> <i class="fa-solid fa-hourglass-start"></i></button>
                    <button onclick="showTopic(2)"><i class="fa-regular fa-clock"></i></button>
                    <button onclick="showTopic(3)"><i class="fa-solid fa-bus-simple"></i></button>
                </nav>
                <div id="about">
                    <h3>Attraction</h3><br>
                    ⩥    The beach’s character changes dramatically with the tides, revealing a massive sand shelf during the day.
                </div>
            </div>

        </div>
        <div id="img">

            <img id="simg" src="../image & logo/set1.jpg">
            <img id="simg" src="../image & logo/set2.jpg">
            <img id="simg" src="../image & logo/set3.jpg">
        </div>
    </div>
    <div class="book">
        <a id="book" href="../eachservicepage/mon.html">For more service</a>
    </div>
    <a id="book" href="../eachaboutpage/mon.html" style="position: absolute;top:20px;left:20px;">Back</a>
    <script>
        const data = [
            {
                "tropic": "<h3>Attraction</h3>",
                "list": "⩥   The beach’s character changes dramatically with the tides, revealing a massive sand shelf during the day."
            },
            {
                "tropic": "<h3>History</h3>",
                "list": "⩥  Setse Beach is a wide, brown-sand beach overlooking the Bay of Bengal, famous for its vast tidal flats. Unlike typical white-sand resorts, Setse offers a glimpse into the traditional coastal lifestyle of the Mon people, including salt production and fishing."
            },
            {
                "tropic": "<h3>Best Time To Go</h3>",
                "list": "⩥   November to May<br>⩥   The water is calmest during the dry season."
            },
            {
                "tropic": "<h3>Transportation</h3>",
                "list": "⩥   A 2.5-hour drive from Mawlamyine via private taxi or bus."
            },
        ]
        function showTopic(index) {
            const p = document.getElementById('about');
            const item = data[index];
            p.innerHTML = `<div class="fade-in">${item.tropic}<br>${item.list}</div>`;
        }
    </script>

</html>
