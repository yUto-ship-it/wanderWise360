<body>

                <nav>
                    <button onclick="showTopic(0)"> <i class="fa-solid fa-bookmark"></i></button>
                    <button onclick="showTopic(1)"> <i class="fa-solid fa-hourglass-start"></i></button>
                    <button onclick="showTopic(2)"><i class="fa-regular fa-clock"></i></button>
                    <button onclick="showTopic(3)"><i class="fa-solid fa-bus-simple"></i></button>

                <div id="about">
                    <h3>Attraction</h3><br>
                    ⩥    Located at the highest point of Sagaing Hill. It is famous for its bronze rabbit and frog statues (representing previous lives of the Buddha) and the stunning view of the "Zay Yar" landscape.

        <div id="img">

            <img id="simg" src="../image & logo/bell2.jpg">

    <a id="book" href="../eachaboutpage/sagaing.html" style="position: absolute;top:20px;left:20px;">Back</a>
    <script>
        const data = [
            {
                "tropic": "<h3>Attraction</h3>",
                "list": "⩥   Located at the highest point of Sagaing Hill. It is famous for its bronze rabbit and frog statues (representing previous lives of the Buddha) and the stunning view of the Zay Yar landscape."
            },
            {
                "tropic": "<h3>History</h3>",
                "list": "⩥   Founded in 1312 by Minister Pon Nya.It is one of the oldest temples on the hill.Local legend claims the pagoda was miraculously completed in a single night through the merit of Minister Pon Nya."
            },
            {
                "tropic": "<h3>Best Time To Go</h3>",
                "list": "⩥    Sunrise is the most spiritual and beautiful time here, as the name Soon Oo implies the very first food offering of the day."
            },
            {
                "tropic": "<h3>Transportation</h3>",
                "list": "⩥Best reached by car or motorbike via the winding road up Sagaing Hill. Many tourists include this as the final stop on a Sagaing Hill tour."
            },
        ]
        function showTopic(index) {
            const p = document.getElementById('about');
            const item = data[index];
            p.innerHTML = `<div class="fade-in">${item.tropic}<br>${item.list}</div>`;
        }
    </script>
