<body>

        </div>

    <script>
        const data = [
            {
                "tropic": "<h3>Attraction</h3>",
                "list": "⩥  A UNESCO-listed ASEAN Heritage Park and the highest peak in Chin State (3,053m). It features Rhododendron forests, rare bird species, and Cloud Sea views"

                "tropic": "<h3>History</h3>",

            },
            {
                "tropic": "<h3>Best Time To Go</h3>",

            },
            {
                "tropic": "<h3>Transportation</h3>",
                "list": "⩥   Located in Southern Chin State (Specific transport routes not mentioned)."
            },
        ]
        function showTopic(index) {
            const p = document.getElementById('about');
            const item = data[index];
            p.innerHTML = `<div class="fade-in">${item.tropic}<br>${item.list}</div>`;
        }
    </script>
