<body>
   
    <div id="glassbox">

                <nav>
                    <button onclick="showTopic(0)"> <i class="fa-solid fa-bookmark"></i></button>
                    <button onclick="showTopic(1)"> <i class="fa-solid fa-hourglass-start"></i></button>
                    <button onclick="showTopic(2)"><i class="fa-regular fa-clock"></i></button>

                    ⩥   Bagan is a UNESCO World Heritage site home to over 2,000 ancient Buddhist temples and pagodas.
                </div>
            </div>

        </div>
        <div id="img">

            <img id="simg" src="../image & logo/bgan1.jpg">

    <div class="book">

    <a id="book" href="../eachaboutpage/mandalay.html" style="position: absolute;top:20px;left:20px;">Back</a>
    <script>
        const data = [
            {
                "tropic": "<h3>Attraction</h3>",
                "list": "⩥  Bagan is a UNESCO World Heritage site home to over 2,000 ancient Buddhist temples and pagodas."
            },
            {
                "tropic": "<h3>History</h3>",
                "list": "⩥  The best time to go is from November to February when the weather is cool and pleasant."
            },
            {
                "tropic": "<h3>Best Time To Go</h3>",
                "list": "⩥   It was the capital of the first Burmese Empire, reaching its golden age between the 11th and 13th centuries."
            },
            {
                "tropic": "<h3>Transportation</h3>",
                "list": "⩥   You can explore the temple plains easily using E-bikes, bicycles, or traditional horse carts."
            },
        ]
        function showTopic(index) {
            const p = document.getElementById('about');
            const item = data[index];
            p.innerHTML = `<div class="fade-in">${item.tropic}<br>${item.list}</div>`;
        }
    </script>
