<!DOCTYPE html>

</head>

<body>
   
    <div id="glassbox">
        <div id="text">
            <h1>Maungmagan Beach (Dawei)</h1><br><br>
            <div id="left">
                <nav>
                    <button onclick="showTopic(0)"> <i class="fa-solid fa-bookmark"></i></button>
                    <button onclick="showTopic(1)"> <i class="fa-solid fa-hourglass-start"></i></button>
                    <button onclick="showTopic(2)"><i class="fa-regular fa-clock"></i></button>
                    <button onclick="showTopic(3)"><i class="fa-solid fa-bus-simple"></i></button>
                </nav>
                <div id="about">
                    <h3>Attraction</h3><br>
                    ⩥   Located near Dawei, this is a long, shallow, and scenic beach that is relatively undeveloped, offering a peaceful atmosphere. It is famous for its beautiful sunsets and local seafood restaurants.
                </div>
            </div>

        </div>
        <div id="img">

            <img id="simg" src="../image & logo/maung1.jpg">
            <img id="simg" src="../image & logo/maung2.jpg">
            <img id="simg" src="../image & logo/maung3.jpg">

        </div>
    </div>
    <div class="book">
        <a id="book" href="../eachservicepage/tanintheryi.html">For more service</a>
    </div>
    <a id="book" href="../eachaboutpage/tanintharyi.html" style="position: absolute;top:20px;left:20px;">Back</a>
    <script>
        const data = [
            {
                "tropic": "<h3>Attraction</h3>",
                "list": "⩥ Located near Dawei, this is a long, shallow, and scenic beach that is relatively undeveloped, offering a peaceful atmosphere. It is famous for its beautiful sunsets and local seafood restaurants."
            },
            {
                "tropic": "<h3>History</h3>",
                "list": "⩥   Maungmagan is the second-oldest beach resort area established in Myanmar after Ngapali. Its name translates to where the emperor's concubines bathe, reflecting its long history as a local retreat."
            },
            {
                "tropic": "<h3>Best Time To Go</h3>",
                "list": "⩥   The best season is November to April, with the calmest seas typically occurring between December and February."
            },
            {
                "tropic": "<h3>Transportation</h3>",
                "list": "⩥   It is located approximately 12 kilometers (about a 45-minute drive) from central Dawei. You can hire a tuk-tuk or local taxi from Dawei to reach the beach."
            },
        ]
        function showTopic(index) {
            const p = document.getElementById('about');
            const item = data[index];
            p.innerHTML = `<div class="fade-in">${item.tropic}<br>${item.list}</div>`;
        }
    </script>
</body>
