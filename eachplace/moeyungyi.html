<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/taunggyi.css">
</head>

<body>
   
    <div id="glassbox">
        <div id="text">
            <h1>Moeyungyi Wetland Resort & Sanctuary</h1><br><br>
            <div id="left">
                <nav>
                    <button onclick="showTopic(0)"> <i class="fa-solid fa-bookmark"></i></button>
                    <button onclick="showTopic(1)"> <i class="fa-solid fa-hourglass-start"></i></button>
                    <button onclick="showTopic(2)"><i class="fa-regular fa-clock"></i></button>
                    <button onclick="showTopic(3)"><i class="fa-solid fa-bus-simple"></i></button>
                </nav>
                <div id="about">
                    <h3>Attraction</h3><br>
                    ⩥   A paradise for nature lovers and bird watchers. You can take boat trips to see thousands of migratory birds, enjoy the peaceful water views, and stay in unique overwater bungalows.
                </div>
            </div>

        </div>
        <div id="img">

            <img id="simg" src="../image & logo/moeyung1.jpg">
            <img id="simg" src="../image & logo/moeyung2.jpg">
            <img id="simg" src="../image & logo/moeyung3.jpg">

        </div>
    </div>
    <div class="book">
        <a id="book" href="../eachservicepage/bago.html">For more service</a>
    </div>
    <a id="book" href="../eachaboutpage/bago.html" style="position: absolute;top:20px;left:20px;">Back</a>
    <script>
        const data = [
            {
                "tropic": "<h3>Attraction</h3>",
                "list": "⩥  A paradise for nature lovers and bird watchers. You can take boat trips to see thousands of migratory birds, enjoy the peaceful water views, and stay in unique overwater bungalows."
            },
            {
                "tropic": "<h3>History</h3>",
                "list": "⩥   Originally a water storage reservoir built in 1878 to facilitate timber floating, it naturally turned into a lush wetland. It was declared a wildlife sanctuary in 1988 and became Myanmar's first Ramsar Site (Wetland of International Importance)."
            },
            {
                "tropic": "<h3>Best Time To Go</h3>",
                "list": "⩥   November to February is the peak season when migratory birds from the northern hemisphere fly in to escape the cold."
            },
            {
                "tropic": "<h3>Transportation</h3>",
                "list": "⩥   Located near Pyinbongyi village, about 70 miles from Yangon. It's best reached by private car or an express bus heading towards Mandalay (ask to be dropped off at the Moeyungyi entrance)."
            },
        ]
        function showTopic(index) {
            const p = document.getElementById('about');
            const item = data[index];
            p.innerHTML = `<div class="fade-in">${item.tropic}<br>${item.list}</div>`;
        }
    </script>
</body>

</html>
