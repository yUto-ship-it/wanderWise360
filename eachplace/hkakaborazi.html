<body>

                    <button onclick="showTopic(2)"><i class="fa-regular fa-clock"></i></button>

    <div class="book">

    <script>
        const data = [
            {
                "tropic": "<h3>Attraction</h3>",
                "list": "⩥  The mountain is situated within a National Park that serves as one of the world's most pristine lost worlds of biodiversity."
            },
            {
                "tropic": "<h3>History</h3>",
                "list": "⩥   Standing at 5,881 meters, Hkakabo Razi is the highest mountain in Southeast Asia and is part of the eastern Himalayas. It was first successfully summited in 1996 by Takashi Ozaki and Nyima Gyaltsen, marking a milestone in regional mountaineering history. "
            },
            {
                "tropic": "<h3>Best Time To Go</h3>",
                "list": "⩥    September to November (for professional climbers). For sightseers, viewing the peak from a distance is best in January."
            },
            {
                "tropic": "<h3>Transportation</h3>",
                "list": "⩥   This requires a flight to Putao, followed by a multi-week trek on foot through dense jungles and alpine terrain. Only experienced mountaineers with special permits should attempt this."
            },
        ]
        function showTopic(index) {
            const p = document.getElementById('about');
            const item = data[index];
            p.innerHTML = `<div class="fade-in">${item.tropic}<br>${item.list}</div>`;
        }
    </script>
