<!DOCTYPE html>

</head>

<body>
   
    <div id="glassbox">
        <div id="text">
            <h1>Zwekabin Mountain</h1><br><br>
            <div id="left">
                <nav>
                    <button onclick="showTopic(0)"> <i class="fa-solid fa-bookmark"></i></button>
                    <button onclick="showTopic(1)"> <i class="fa-solid fa-hourglass-start"></i></button>
                    <button onclick="showTopic(2)"><i class="fa-regular fa-clock"></i></button>
                    <button onclick="showTopic(3)"><i class="fa-solid fa-bus-simple"></i></button>
                </nav>
                <div id="about">
                    <h3>Attraction</h3><br>
                    ⩥   The symbol of Kayin State<br>⩥   Popular hiking destination<br>⩥   Stunning panoramic view for the top
                </div>
            </div>

        </div>
        <div id="img">

            <img id="simg" src="../image & logo/zwe1.jpg">
            <img id="simg" src="../image & logo/zwe2.jpg">
            <img id="simg" src="../image & logo/zwe3.jpg">

        </div>
    </div>
    <div class="book">
        <a id="book" href="../eachservicepage/kayin.html">For more service</a>
    </div>
    <a id="book" href="../eachaboutpage/kayin.html" style="position: absolute;top:20px;left:20px;">Back</a>
    <script>
        const data = [
            {
                "tropic": "<h3>Attraction</h3>",
                "list": "  ⩥   The symbol of Kayin State<br>⩥   Popular hiking destination<br>⩥   Stunning panoramic view for the top"
            },
            {
                "tropic": "<h3>History</h3>",
                "list": "⩥  There is a monoastery and pagoda on the mountain.It is an important religious site for local people"
            },
            {
                "tropic": "<h3>Best Time To Go</h3>",
                "list": "⩥ Dry Season(Nov-Feb) <br>⩥ Hot Season(March-May)  <br>⩥ Rainy Season(June-October)  November"
            },
            {
                "tropic": "<h3>Transportation</h3>",
                "list": "⩥   Long-tail motorboats for lake travel <br>⩥   Tuk-Tuk for land travel"
            },
        ]
        function showTopic(index) {
            const p = document.getElementById('about');
            const item = data[index];
            p.innerHTML = `<div class="fade-in">${item.tropic}<br>${item.list}</div>`;
        }
    </script>

</html>
