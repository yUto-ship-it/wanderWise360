<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/taunggyi.css">
</head>

<body>
   
    <div id="glassbox">
        <div id="text">
            <h1>Kalaw</h1><br><br>
            <div id="left">
                <nav>
                    <button onclick="showTopic(0)"> <i class="fa-solid fa-bookmark"></i></button>
                    <button onclick="showTopic(1)"> <i class="fa-solid fa-hourglass-start"></i></button>
                    <button onclick="showTopic(2)"><i class="fa-regular fa-clock"></i></button>
                    <button onclick="showTopic(3)"><i class="fa-solid fa-bus-simple"></i></button>
                </nav>
                <div id="about">
                    <h3>Attraction</h3><br>
                    ⩥   Known for trekking through pine forests to ethnic villages and the vibrant Kalaw Morning Market.
                </div>
            </div>

        </div>
        <div id="img">

            <img id="simg" src="../image & logo/kalaw2.jpg">
            <img id="simg" src="../image & logo/kalaw3.jpg">
            <img id="simg" src="../image & logo/kalaw4.jpg">

        </div>
    </div>
    <div class="book">
        <a id="book" href="../eachservicepage/shan.html">For more service</a>
    </div>
    <a id="book" href="../eachaboutpage/shan.html" style="position: absolute;top:20px;left:20px;">Back</a>
    <script>
        const data = [
            {
                "tropic": "<h3>Attraction</h3>",
                "list": "⩥  Known for trekking through pine forests to ethnic villages and the vibrant Kalaw Morning Market."
            },
            {
                "tropic": "<h3>History</h3>",
                "list": "⩥   A popular hill station established as a retreat for British officials during the colonial era."
            },
            {
                "tropic": "<h3>Best Time To Go</h3>",
                "list": "⩥   March to May (to escape the heat) or the cool season from November to February."
            },
            {
                "tropic": "<h3>Transportation</h3>",
                "list": "⩥   Accessible by train from Thazi or Pyin Oo Lwin, and by highway buses from major cities."
            },
        ]
        function showTopic(index) {
            const p = document.getElementById('about');
            const item = data[index];
            p.innerHTML = `<div class="fade-in">${item.tropic}<br>${item.list}</div>`;
        }
    </script>
</body>

</html>
