<!DOCTYPE html>
<html lang="my">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandalay Premium Services | Telegram Booking</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #1a1410; 
            --bg-card: #2a1f18; 
            --primary-gold: #c5a059; 
            --tg-blue: #0088cc;
            --white: #ffffff;
            --text-muted: #a38f85;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--white); line-height: 1.6; }

        /* --- Header --- */
        header {
            background: linear-gradient(rgba(26, 20, 16, 0.7), rgba(26, 20, 16, 0.95)), 
                        url('../image & logo/manlay1.jpg') center/cover no-repeat;
            height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border-bottom: 3px solid var(--primary-gold);
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 50px 20px; }
        .section-title { font-size: 1.8rem; margin: 40px 0 25px; color: var(--primary-gold); border-left: 5px solid var(--primary-gold); padding-left: 15px; text-transform: uppercase; }

        /* --- Service Cards --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .card { background: var(--bg-card); border-radius: 25px; overflow: hidden; border: 1px solid rgba(197, 160, 89, 0.2); transition: 0.4s; }
        .card:hover { transform: translateY(-10px); border-color: var(--primary-gold); }
        .card-img { height: 180px; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 20px; }
        .price { color: var(--primary-gold); font-weight: 800; font-size: 1.2rem; display: block; margin: 10px 0; }

        /* --- Booking Form Section --- */
        .form-section {
            background: #231a14; padding: 40px; border-radius: 30px; margin-top: 60px; 
            border: 1px solid var(--primary-gold); max-width: 600px; margin-left: auto; margin-right: auto;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--primary-gold); font-weight: 600; }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #443328; 
            background: #1a1410; color: white; outline: none;
        }

        .btn-tg {
            width: 100%; padding: 16px; background: var(--tg-blue); color: white; 
            border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 800; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
        }
        .btn-tg:hover { background: #0077b3; transform: scale(1.02); }

        footer { text-align: center; padding: 40px; margin-top: 60px; color: var(--text-muted); border-top: 1px solid var(--primary-gold); }
    </style>
</head>

<body>

    <header>
        <h1 style="color: var(--primary-gold); font-size: 2.5rem;">OUR SERVICES</h1>
        <p>Premium Stays & Luxury Transportation</p>
    </header>

    <div class="container">
        
        <h2 class="section-title">Available Packages</h2>
        <div class="grid">
            <div class="card">
                <div class="card-img"><img src="../image & logo/manlay1.jpg"></div>
                <div class="card-body">
                    <h3>Mercure Mandalay Hill</h3>
                    <span class="price">550,000 MMK / Night</span>
                    <p style="font-size: 0.9rem; color: var(--text-muted);">Luxury stay with hill view.</p>
                </div>
            </div>
            <div class="card">
                <div class="card-img"><img src="https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?q=80&w=2070"></div>
                <div class="card-body">
                    <h3>Private City Taxi</h3>
                    <span class="price">80,000 MMK / Day</span>
                    <p style="font-size: 0.9rem; color: var(--text-muted);">Full day tour including fuel.</p>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h2 style="text-align: center; color: var(--primary-gold); margin-bottom: 30px;">
                <i class="fa-solid fa-file-signature"></i> BOOKING FORM
            </h2>
            
            <form id="bookingForm">
                <div class="form-group">
                    <label>အမည် (Your Name)</label>
                    <input type="text" id="userName" placeholder="မင့်နာမည်ရေးပါ" required>
                </div>

                <div class="form-group">
                    <label>ဖုန်းနံပါတ် (Phone Number)</label>
                    <input type="tel" id="userPhone" placeholder="09xxxxxxxxx" required>
                </div>

                <div class="form-group">
                    <label>ဝန်ဆောင်မှုရွေးပါ (Select Service)</label>
                    <select id="userPackage">
                        <option value="Mercure Mandalay Hotel">Mercure Mandalay Hill Resort</option>
                        <option value="The Link-78 Hotel">The Link-78 Hotel</option>
                        <option value="Private City Taxi">Private City Taxi (Full Day)</option>
                        <option value="Private Van (Group)">Private Van (Group Tour)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>သွားမည့်ရက်စွဲ (Travel Date)</label>
                    <input type="date" id="travelDate" required>
                </div>

                <button type="submit" class="btn-tg">
                    <i class="fa-brands fa-telegram"></i> CONFIRM VIA TELEGRAM
                </button>
            </form>
        </div>

    </div>

    <footer>
        <p>&copy; 2026 Mandalay Premium Travel Guide</p>
    </footer>

    <script>
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Form data တွေကို ယူမယ်
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const service = document.getElementById('userPackage').value;
            const date = document.getElementById('travelDate').value;

            // Telegram အတွက် စာသားကို Form ပုံစံအတိုင်း စီမယ်
            // %0A က စာကြောင်းအသစ် (Enter) ဆင်းဖို့အတွက်ပါ
            const message = `🔔 *New Booking Request* %0A%0A` +
                            `👤 *Name:* ${name}%0A` +
                            `📞 *Phone:* ${phone}%0A` +
                            `🏨 *Service:* ${service}%0A` +
                            `📅 *Date:* ${date}%0A%0A` +
                            `--- Mandalay Travel Guide ---`;

            // !!! ဒီနေရာမှာ Your_Telegram_Username ကို @ မပါဘဲ မင်းရဲ့ Username အမှန်နဲ့ ပြောင်းပါ !!!
            const tgUsername = "yUto487_bot"; 

            // Telegram Link တည်ဆောက်မယ်
            const finalUrl = `https://t.me/${tgUsername}?text=${message}`;

            // Telegram ကို ဖွင့်လိုက်မယ်
            window.open(finalUrl, '_blank');
        });
    </script>

</body>
</html>
