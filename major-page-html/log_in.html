<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; }
        .container { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; }
        .toggle-btns { display: flex; margin-bottom: 1.5rem; border-bottom: 2px solid #ddd; }
        .toggle-btns label { flex: 1; text-align: center; padding: 10px; cursor: pointer; }
        input[type="radio"] { display: none; }
        /* Switch forms based on radio selection */
        #login-form, #signup-form { display: none; }
        #tab-login:checked ~ .toggle-btns label[for="tab-login"],
        #tab-signup:checked ~ .toggle-btns label[for="tab-signup"] { border-bottom: 2px solid #007bff; color: #007bff; }
        #tab-login:checked ~ #login-form, #tab-signup:checked ~ #signup-form { display: block; }
        /* Basic Form Styling */
        form div { margin-bottom: 1rem; }
        input { width: 100%; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <input type="radio" name="tab" id="tab-login" checked>
        <input type="radio" name="tab" id="tab-signup">
        <div class="toggle-btns">
            <label for="tab-login">Login</label>
            <label for="tab-signup">Sign Up</label>
        </div>
        <form id="login-form">
            <h2>Login</h2>
            <div><input type="text" placeholder="Username" required></div>
            <div><input type="password" placeholder="Password" required></div>
            <button type="submit">Login</button>
        </form>
        <form id="signup-form">
            <h2>Sign Up</h2>
            <div><input type="text" placeholder="Full Name" required></div>
            <div><input type="email" placeholder="Email" required></div>
            <div><input type="password" placeholder="Password" required></div>
            <button type="submit">Sign Up</button>
        </form>
    </div>
</body>
</html>
