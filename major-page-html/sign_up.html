<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/sign_up.css">
</head>

<body>
    <div class="glass-card">
        <div class="profile-icon">
        </div>

        <h2>Register Account</h2>

        <form id="registrationForm">
            <div class="input-group">
                <i class="fa-regular fa-user"></i>
                <input type="text" placeholder="Your Name" required>
            </div>

            <div class="input-group">
                <i class="fa-regular fa-id-badge"></i>
                <input type="text" placeholder="Username" required>
            </div>

            <div class="input-group">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" placeholder="Your Email" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
                <i class="fa-regular fa-eye toggle-password" onclick="togglePassword('password', this)"></i>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                <i class="fa-regular fa-eye toggle-password" onclick="togglePassword('confirmPassword', this)"></i>
            </div>

            <p class="helper-text">Don't worry, you can change your username later</p>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" required>
                <label for="terms">I agree to <a href="#">Terms of Service</a> & <a href="#">Privacy Policy</a></label>
            </div>
            <div class="log">
                <h5>Already have an account?</h5><a href="e.html" style="margin-left:10px;">
                    <h5>Log in</h5>
                </a>
            </div>

            <button type="submit" class="register-btn">Register</button>
        </form>
    </div>

    <script src="../javascript/sign_up.js"></script>
</body>

</html>
