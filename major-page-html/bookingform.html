<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Booking</title>
    <link rel="stylesheet" href="../css/bookingform.css">

</head>

<body>
    <fieldset>
        <legend>
            <img src="../image & logo/logo.png">
        </legend>
        <div class="input">
            <label for="name">Full Name</label>
            <input type="text" id="name">
        </div>
        <div class="input">
            <label for="NRC">NRC no.</label>
            <div>
                <select id="nrc">
                    <option value="1/">1/</option>
                    <option value="2/">2/</option>
                    <option value="3/">3/</option>
                    <option value="4/">4/</option>
                    <option value="5/">5/</option>
                    <option value="6/">6/</option>
                    <option value="7/">7/</option>
                    <option value="8/">8/</option>
                    <option value="9/">9/</option>
                    <option value="10/">10/</option>
                    <option value="11/">11/</option>
                    <option value="12/">12/</option>
                    <option value="13/">13/</option>
                    <option value="14/">14/</option>
                </select>
                <input type="text" placeholder="Town" id="town">
                <select id="coty">
                    <option value="(N)">(N)</option>
                    <option value="(E)">(E)</option>
                    <option value="(P)">(P)</option>
                    <option value="(T)">(T)</option>
                    <option value="(S)">(S)</option>
                </select>
                <input type="number" style="width:80px;" id="a">
            </div>
        </div>
        <div class="input">
            <label>Phone Number</label>
            <div class="phone-container">
                <select class="region-code" name="countryCode">
                    <option value="+95" selected>Myanmar (+95)</option>
                    <option value="+81">Japan (+81)</option>
                    <option value="+82">S. Korea (+82)</option>
                    <option value="+66">Thailand (+66)</option>
                    <option value="+65">Singapore (+65)</option>
                    <option value="+60">Malaysia (+60)</option>
                    <option value="+84">Vietnam (+84)</option>
                    <option value="+62">Indonesia (+62)</option>
                    <option value="+63">Philippines (+63)</option>
                    <option value="+86">China (+86)</option>
                </select>
                <input type="tel" placeholder="912345678" style="flex:1;width:120px;" name="phone">
            </div>
        </div>
        <div class="input">
            <label for="in">Check-in</label>
            <input type="date" id="in">
        </div>
        <div class="input">
            <label for="out">Check-out</label>
            <input type="date" id="out">
        </div>
        <div class="input">
            <label>Room Prefernce</label>
            <div class="room">
                <select class="roomtype" id="room" name="room">
                    <option value="Single Room">Single Room</option>
                    <option value="Double Room">Double Room</option>
                    <option value="Twin Room">Twin Room</option>
                    <option value="Triple Room">Triple Room</option>
                </select>
            </div>
        </div>
        <div class="input">
            <label for="no">Number of People</label>
            <input type="number" id="no">
        </div>
        <div class="input">
            <label>Payment Method</label>
            <select id="pay">
                <option value="Kpay">Kpay-09 673586673</option>
                <option value="UAB pay">UAB pay-09 673586673</option>
                <option value="AYA pay">AYA pay-09 673586673</option>
                <option value="CB pay">CB pay-09 673586673</option>
                <option value="VISA card">VISA card-09 673586673</option>
                <option vlaue="Bank Transfer">Bank Transfer</option>
            </select>
        </div>
        <button type="submit" onclick="generateTicket(event)" class="button">Book Now</button>
        <div id="ticket">
            <div id="ticket-box">
                <h3>booking Ticket</h3>
                <div id="ticketdata"></div>
                <button onclick="window.print()">Save</button>
            </div>
        </div>
    </fieldset>
    </div>
    <script src="../javascript/bookingform.js">

    </script>
</body>

</html>
